<!DOCTYPE html>
<html lang="en" class="dark selection:bg-white selection:text-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test IO Auto-Accept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        black: '#000000',
                        white: '#ffffff',
                        gray: {
                            900: '#111111',
                            800: '#1a1a1a',
                            700: '#2a2a2a',
                            600: '#404040',
                            500: '#737373',
                            400: '#a3a3a3',
                            300: '#d4d4d4',
                            200: '#e5e5e5',
                            100: '#f5f5f5',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            background-image: 
                radial-gradient(circle at 50% 0%, #1a1a1a 0%, transparent 50%),
                radial-gradient(circle at 10% 100%, #111111 0%, transparent 40%);
            background-attachment: fixed;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #404040; }

        .glass-card {
            background: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #000000;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 lg:p-12 font-sans antialiased animate-fade-in">

    <div class="max-w-6xl mx-auto">
        <!-- Top Nav / Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 pb-6 border-b border-white/10 animate-slide-up">
            <div class="flex items-start gap-4 mb-4 md:mb-0">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-black shrink-0 mt-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-white">
                        Test IO Automata
                    </h1>
                    <p class="text-gray-400 mt-1 font-medium tracking-wide text-sm uppercase">Autonomous Testing Engine</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 bg-gray-900/50 py-2 px-5 rounded-full border border-white/5">
                <div id="status-indicator" class="w-2.5 h-2.5 rounded-full bg-gray-500"></div>
                <div id="status-badge" class="font-mono uppercase tracking-widest text-xs font-semibold text-gray-300">
                    Initializing System
                </div>
            </div>
        </header>

        <!-- Main Dashboard Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            
            <!-- System Telemetry (Stats) -->
            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Active Invites -->
                <div class="glass-card rounded-2xl p-8 flex flex-col justify-between animate-slide-up" style="animation-delay: 0.1s;">
                    <div class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-6 flex justify-between items-center">
                        Active Engagements
                        <svg class="w-4 h-4 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    </div>
                    <div id="stat-active" class="text-7xl font-light tracking-tighter text-white">0</div>
                    <div class="mt-4 h-1 w-12 bg-white/20 rounded-full"></div>
                </div>

                <!-- Accepted Today -->
                <div class="glass-card rounded-2xl p-8 flex flex-col justify-between animate-slide-up" style="animation-delay: 0.2s;">
                    <div class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-6 flex justify-between items-center">
                        Yield Today
                        <svg class="w-4 h-4 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div id="stat-accepted" class="text-7xl font-light tracking-tighter text-white">0</div>
                    <div class="mt-4 h-1 w-12 bg-white/20 rounded-full"></div>
                </div>
            </div>
            
            <!-- Command Center -->
            <div class="glass-card rounded-2xl p-8 flex flex-col animate-slide-up" style="animation-delay: 0.3s;">
                <div class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-8">
                    Override Controls
                </div>
                
                <div class="flex flex-col gap-4 mt-auto">
                    <button id="btn-resume" onclick="sendCommand('resume')" class="btn btn-primary w-full py-4 px-6 rounded-xl font-semibold text-sm tracking-wide flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                        Engage System
                    </button>
                    
                    <button id="btn-pause" onclick="sendCommand('pause')" class="btn btn-secondary w-full py-4 px-6 rounded-xl font-semibold text-sm tracking-wide flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                        Suspend Operations
                    </button>
                </div>
                <div class="mt-6 text-center text-xs text-gray-500 font-mono">
                    STATE CHANGES ARE IMMEDIATE
                </div>
            </div>
        </div>

        <!-- Vision Matrix (Screenshots) -->
        <div class="animate-slide-up" style="animation-delay: 0.4s;">
            <div class="flex justify-between items-end mb-6 border-b border-white/10 pb-4">
                <div>
                    <h2 class="text-xl font-medium tracking-tight text-white">Visual Telemetry</h2>
                    <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Recent Captures</p>
                </div>
                <button onclick="fetchScreenshots()" class="text-xs uppercase tracking-widest font-semibold text-white/50 hover:text-white transition-colors flex items-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Sync
                </button>
            </div>
            
            <div id="screenshot-gallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Skeleton Loaders -->
                <div class="aspect-[4/3] rounded-xl skeleton"></div>
                <div class="aspect-[4/3] rounded-xl skeleton"></div>
                <div class="aspect-[4/3] rounded-xl skeleton"></div>
                <div class="aspect-[4/3] rounded-xl skeleton"></div>
                <div class="aspect-[4/3] rounded-xl skeleton hidden lg:block"></div>
            </div>
        </div>
        
        <!-- Footer -->
        <footer class="mt-20 pt-8 border-t border-white/5 text-center flex flex-col md:flex-row justify-between items-center text-xs text-gray-600 font-mono uppercase tracking-widest">
            <div>Test IO Automata v2.0</div>
            <div class="mt-4 md:mt-0 flex gap-4">
                <span id="footer-time">00:00:00</span>
                <span>•</span>
                <span>SYSTEM ONLINE</span>
            </div>
        </footer>
    </div>

    <script>
        // State
        let isPaused = false;

        // Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('footer-time').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                updateUI(data);
            } catch (err) {
                console.error("Failed to fetch status", err);
                const badge = document.getElementById('status-badge');
                const indicator = document.getElementById('status-indicator');
                
                badge.innerText = "OFFLINE";
                badge.className = "font-mono uppercase tracking-widest text-xs font-semibold text-gray-500";
                indicator.className = "w-2.5 h-2.5 rounded-full bg-gray-600";
            }
        }

        async function fetchScreenshots() {
            try {
                const res = await fetch('/api/screenshots');
                const data = await res.json();
                const gallery = document.getElementById('screenshot-gallery');
                
                if (data.screenshots.length === 0) {
                    gallery.innerHTML = '<div class="col-span-full py-12 text-center text-sm font-mono text-gray-500 uppercase tracking-widest border border-dashed border-white/10 rounded-xl">No telemetry data available</div>';
                    return;
                }

                gallery.innerHTML = '';
                data.screenshots.forEach(ss => {
                    const col = document.createElement('div');
                    col.className = 'group relative aspect-[4/3] rounded-xl overflow-hidden bg-gray-900 border border-white/5 transition-all duration-300 hover:border-white/30 hover:shadow-[0_0_20px_rgba(255,255,255,0.1)]';
                    
                    const img = document.createElement('img');
                    img.src = '/screenshots/' + ss;
                    img.className = 'w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500 cursor-pointer filter grayscale group-hover:grayscale-0';
                    img.onclick = () => window.open(img.src, '_blank');
                    
                    // Parse filename
                    const parts = ss.split('/');
                    const filename = parts[parts.length - 1];
                    const nameParts = filename.replace('.png', '').replace('_full', '').split('_');
                    
                    let actionLabel = 'CAPTURE';
                    let timeLabel = '';
                    
                    try {
                        const timeStr = nameParts.pop(); // 163442
                        const dateStr = nameParts.pop(); // 20260711
                        actionLabel = nameParts.join(' ').toUpperCase();
                        timeLabel = timeStr.substring(0,2) + ":" + timeStr.substring(2,4) + ":" + timeStr.substring(4,6);
                    } catch (e) {}
                    
                    const overlay = document.createElement('div');
                    overlay.className = 'absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-80 pointer-events-none flex flex-col justify-end p-4';
                    
                    const label = document.createElement('div');
                    label.className = 'text-[10px] font-bold text-white uppercase tracking-wider truncate mb-1';
                    label.innerText = actionLabel;
                    
                    const time = document.createElement('div');
                    time.className = 'text-[9px] font-mono text-gray-400';
                    time.innerText = timeLabel;
                    
                    overlay.appendChild(label);
                    overlay.appendChild(time);
                    
                    col.appendChild(img);
                    col.appendChild(overlay);
                    gallery.appendChild(col);
                });
            } catch (err) {
                console.error("Failed to fetch screenshots", err);
            }
        }

        async function sendCommand(cmd) {
            try {
                // Optimistic UI update
                if(cmd === 'pause') {
                    document.getElementById('btn-pause').disabled = true;
                    document.getElementById('btn-resume').disabled = false;
                } else {
                    document.getElementById('btn-pause').disabled = false;
                    document.getElementById('btn-resume').disabled = true;
                }
                
                await fetch(`/api/${cmd}`, { method: 'POST' });
                fetchStatus();
            } catch (err) {
                console.error(`Failed to ${cmd} bot`);
                fetchStatus(); // Reset on error
            }
        }

        function updateUI(data) {
            isPaused = data.is_paused;

            // Update stats with a slight counter animation effect if they changed
            const statAccepted = document.getElementById('stat-accepted');
            const statActive = document.getElementById('stat-active');
            
            if(statAccepted.innerText != (data.tests_accepted_today || 0)) {
                statAccepted.style.opacity = 0;
                setTimeout(() => {
                    statAccepted.innerText = data.tests_accepted_today || 0;
                    statAccepted.style.opacity = 1;
                }, 150);
            }
            
            if(statActive.innerText != (data.active_test_count || 0)) {
                statActive.style.opacity = 0;
                setTimeout(() => {
                    statActive.innerText = data.active_test_count || 0;
                    statActive.style.opacity = 1;
                }, 150);
            }

            // Update badge
            const badge = document.getElementById('status-badge');
            const indicator = document.getElementById('status-indicator');
            
            badge.innerText = data.state;
            
            // Minimalist status colors
            if (isPaused) {
                badge.className = "font-mono uppercase tracking-widest text-xs font-semibold text-gray-400";
                indicator.className = "w-2.5 h-2.5 rounded-full bg-gray-500 animate-pulse";
            } else if (data.state === 'sleeping') {
                badge.className = "font-mono uppercase tracking-widest text-xs font-semibold text-gray-500";
                indicator.className = "w-2.5 h-2.5 rounded-full bg-gray-700";
            } else if (data.state === 'checking' || data.state === 'idle') {
                badge.className = "font-mono uppercase tracking-widest text-xs font-semibold text-white";
                indicator.className = "w-2.5 h-2.5 rounded-full bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)]";
            } else if (data.state === 'error') {
                badge.className = "font-mono uppercase tracking-widest text-xs font-semibold text-white";
                indicator.className = "w-2.5 h-2.5 rounded-full border-2 border-white bg-transparent";
            } else {
                badge.className = "font-mono uppercase tracking-widest text-xs font-semibold text-white";
                indicator.className = "w-2.5 h-2.5 rounded-full bg-white animate-pulse-slow";
            }

            // Update buttons
            const btnResume = document.getElementById('btn-resume');
            const btnPause = document.getElementById('btn-pause');

            if (isPaused) {
                btnResume.disabled = false;
                btnPause.disabled = true;
            } else {
                btnPause.disabled = false;
                btnResume.disabled = true;
            }
        }

        // Init
        fetchStatus();
        fetchScreenshots();
        setInterval(fetchStatus, 2000); // Poll every 2 seconds
        setInterval(fetchScreenshots, 10000); // Poll screenshots every 10 seconds
    </script>
</body>
</html>
